<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SerratecFlix — Login</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="logo">Serratec<span>Flix</span></div>
        <nav class="navbar">
            <button class="menu-toggle" aria-label="Abrir menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../pages/serie.html">Série</a></li>
                <li><a href="../pages/filme.html">Filme</a></li>
                <li><a href="../pages/categoria.html">Categoria</a></li>
                <li><a href="../pages/avaliacao.html">Avaliação</a></li>
                <li><a href="../pages/favoritos.html">Favoritos</a></li>
                <li><a href="../pages/usuario.html">Usuário</a></li>
                <li><a href="../pages/sobre.html">Sobre</a></li>
                <li><a href="../pages/login.html">Login</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="form-container">
            <h2>Entrar no SerratecFlix</h2>
            <form id="login-form" onsubmit="realizarLogin(event)">
                <div class="form-grid" style="grid-template-columns: 1fr;">
                    <div class="form-group full">
                        <label for="username">E-mail *</label>
                        <input type="username" id="username" placeholder="Seu email" required />
                    </div>
                    <div class="form-group full">
                        <label for="login-senha">Senha *</label>
                        <input type="password" id="login-senha" placeholder="Sua senha" required />
                    </div>
                </div>
                <div class="form-actions" style="margin-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Entrar</button>
                </div>
            </form>
        </div>
        <div id="toast"></div>
    </main>
    <footer>
        <div class="footer-content">
            <p>&copy; 2026 SerratecFlix. Todos os direitos reservados.</p>
            <ul class="footer-links">
                <li><a href="../pages/termos.html">Termos e condições de uso</a></li>
                <li><a href="../pages/privacidade.html">Política de privacidade</a></li>
                <li><a href="../pages/sobre.html">Sobre</a></li>
            </ul>
        </div>
    </footer>
    <script src="../js/script.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
